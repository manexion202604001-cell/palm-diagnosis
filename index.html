<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<title>手相×算命学 診断アプリ</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    box-sizing: border-box;
  }
  html { touch-action: manipulation; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    margin: 0;
    padding: 0;
  }
  .mincho { font-family: 'Shippori Mincho', serif; }
  
  /* キャラクター画像 - 個別画像を直接表示 */
  .character-image {
    width: 100%;
    max-width: 280px;
    height: auto;
    display: block;
    margin: 0 auto;
    image-rendering: -webkit-optimize-contrast;
    border-radius: 12px;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fade-in { animation: fadeIn 0.6s ease-out; }
  .spin { animation: spin 2s linear infinite; }
  
  @supports (padding-top: env(safe-area-inset-top)) {
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
  }
  input[type="file"] { display: none; }
  
  /* ローディング用アニメーション */
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.9; }
  }
  
  @keyframes twinkle {
    0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.2) rotate(180deg); opacity: 0.5; }
  }
  
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
  
  @keyframes phaseFadeIn {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  
  .pulse { animation: pulse 2s ease-in-out infinite; }
  .twinkle { animation: twinkle 2s ease-in-out infinite; }
  .twinkle-delayed { animation: twinkle 2s ease-in-out 1s infinite; }
  .phase-fade-in { animation: phaseFadeIn 0.6s ease-out; }
  
  .shimmer {
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: shimmer 1.5s infinite;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const CHARACTER_TYPES = [
  {"id": "01", "name": "切り開きタイプ", "subtitle": "自立・努力・現実志向", "description": "自分の力で道を切り開く、努力家のリーダー。"},
  {"id": "02", "name": "考えすぎタイプ", "subtitle": "慎重・分析・内向", "description": "頭で考えすぎてしまう、繊細な慎重派。"},
  {"id": "03", "name": "行動爆速タイプ", "subtitle": "直感・勢い・ポジティブ", "description": "思いついたら即行動！エネルギッシュな行動派。"},
  {"id": "04", "name": "リーダータイプ", "subtitle": "責任感・統率・冷静", "description": "みんなをまとめるカリスマ、信頼されるリーダー。"},
  {"id": "05", "name": "癒しタイプ", "subtitle": "優しい・共感・献身", "description": "人の気持ちに寄り添える、優しい癒し系。"},
  {"id": "06", "name": "完璧主義タイプ", "subtitle": "几帳面・努力・美意識", "description": "細部までこだわる完璧主義、努力で理想を叶える人。"},
  {"id": "07", "name": "自由人タイプ", "subtitle": "マイペース・創造性・個性", "description": "自分らしく自由に生きる、クリエイティブな自由人。"},
  {"id": "08", "name": "愛されタイプ", "subtitle": "素直・明るい・社交的", "description": "みんなに愛されるムードメーカー、人とのつながりを大切にする。"},
  {"id": "09", "name": "孤高タイプ", "subtitle": "職人気質・集中・寡黙", "description": "一人の時間を大切にする、孤高の職人タイプ。"},
  {"id": "10", "name": "成長途中タイプ", "subtitle": "不安・努力・伸びしろ", "description": "まだ自信はないけど、これから大きく成長する人。"}
];

const LINE_URL = "https://utg.manexion.co.jp/line/open/cFQ5KxswDAGI?mtid=K0wmfluUtmz6";

// 共有URLでアクセスした人へのバナー
function SharedAccessBanner() {
  const urlParams = new URLSearchParams(window.location.search);
  const isShared = urlParams.get('type');
  
  if (!isShared) return null;
  
  const startMyDiagnosis = () => {
    window.history.replaceState({}, '', window.location.pathname);
    window.location.reload();
  };
  
  return (
    <div className="bg-gradient-to-r from-purple-100 via-pink-100 to-orange-100 border-2 border-purple-300 rounded-2xl p-4 mb-4 fade-in shadow-lg">
      <div className="flex items-start gap-3">
        <div className="text-3xl">🎁</div>
        <div className="flex-1">
          <p className="text-sm font-bold text-slate-800 mb-1">友達からの診断結果が届いています！</p>
          <p className="text-xs text-slate-600 mb-3">下記が友達の診断結果です。あなたも自分の手相を診断してみませんか？</p>
          <button 
            onClick={startMyDiagnosis}
            className="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white px-4 py-3 rounded-xl text-sm font-bold active:scale-95 shadow-lg"
          >
            ✨ 自分の診断を始める
          </button>
        </div>
      </div>
    </div>
  );
}

// 共有URL生成・シェア機能
function ShareUrlSection({ type }) {
  const [copied, setCopied] = useState(false);
  const [showQR, setShowQR] = useState(false);
  
  if (!type) return null;
  
  // 共有URL生成
  const baseUrl = window.location.origin + window.location.pathname;
  const shareUrl = `${baseUrl}?type=${type.id}`;
  
  // クリップボードにコピー
  const copyToClipboard = async () => {
    try {
      await navigator.clipboard.writeText(shareUrl);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch (err) {
      // フォールバック
      const textArea = document.createElement('textarea');
      textArea.value = shareUrl;
      document.body.appendChild(textArea);
      textArea.select();
      try {
        document.execCommand('copy');
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      } catch (e) {
        alert('コピーに失敗しました');
      }
      document.body.removeChild(textArea);
    }
  };
  
  // メッセージ
  const shareMessage = `🔮 私の手相診断結果は「${type.name}」でした！\n${type.description}\n\n👇あなたもやってみよう`;
  
  // LINE共有URL
  const lineShareUrl = `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareMessage)}`;
  
  // X(Twitter)共有URL
  const twitterShareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareMessage + '\n#手相診断 #算命学')}&url=${encodeURIComponent(shareUrl)}`;
  
  // ネイティブシェア
  const nativeShare = async () => {
    const shareData = {
      title: `手相診断: ${type.name}`,
      text: shareMessage,
      url: shareUrl
    };
    
    if (navigator.share) {
      try {
        await navigator.share(shareData);
      } catch (err) {
        if (err.name !== 'AbortError') {
          copyToClipboard();
        }
      }
    } else {
      copyToClipboard();
    }
  };
  
  // QRコード（外部API使用）
  const qrCodeUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(shareUrl)}`;
  
  return (
    <div>
      {/* URL表示エリア */}
      <div className="bg-slate-50 rounded-lg p-3 mb-3 border border-slate-200">
        <p className="text-xs text-slate-500 mb-2">📍 シェアURL</p>
        <div className="flex items-center gap-2">
          <input 
            type="text" 
            value={shareUrl} 
            readOnly 
            className="flex-1 bg-transparent text-xs text-slate-700 outline-none truncate"
            onClick={(e) => e.target.select()}
          />
          <button 
            onClick={copyToClipboard}
            className={`px-3 py-1.5 rounded-lg text-xs font-bold whitespace-nowrap transition-all ${
              copied 
                ? 'bg-green-500 text-white' 
                : 'bg-amber-500 text-white active:scale-95'
            }`}
          >
            {copied ? '✓ コピー済' : '📋 コピー'}
          </button>
        </div>
      </div>
      
      {/* メインアクションボタン */}
      <div className="grid grid-cols-2 gap-2 mb-3">
        <button 
          onClick={nativeShare}
          className="bg-gradient-to-r from-purple-500 to-pink-500 text-white py-3 px-3 rounded-xl font-bold active:scale-95 transition-all text-sm shadow-lg flex items-center justify-center gap-2"
        >
          <span className="text-lg">📲</span>
          <span>シェアする</span>
        </button>
        <button 
          onClick={() => setShowQR(!showQR)}
          className="bg-gradient-to-r from-slate-700 to-slate-600 text-white py-3 px-3 rounded-xl font-bold active:scale-95 transition-all text-sm shadow-lg flex items-center justify-center gap-2"
        >
          <span className="text-lg">📱</span>
          <span>{showQR ? 'QR隠す' : 'QRコード'}</span>
        </button>
      </div>
      
      {/* QRコード表示 */}
      {showQR && (
        <div className="bg-white rounded-lg p-4 mb-3 border-2 border-slate-200 text-center fade-in">
          <img src={qrCodeUrl} alt="QRコード" className="mx-auto mb-2" style={{maxWidth: '200px'}} />
          <p className="text-xs text-slate-600">📱 スマホでスキャンして共有</p>
        </div>
      )}
      
      {/* SNS別シェア */}
      <div className="grid grid-cols-2 gap-2">
        <a 
          href={lineShareUrl}
          target="_blank"
          rel="noopener noreferrer"
          className="bg-[#06C755] text-white py-2.5 px-3 rounded-xl text-center active:scale-95 transition-all text-xs font-bold flex items-center justify-center gap-1"
        >
          <span>💚</span>
          <span>LINEで送る</span>
        </a>
        <a 
          href={twitterShareUrl}
          target="_blank"
          rel="noopener noreferrer"
          className="bg-black text-white py-2.5 px-3 rounded-xl text-center active:scale-95 transition-all text-xs font-bold flex items-center justify-center gap-1"
        >
          <span>𝕏</span>
          <span>でシェア</span>
        </a>
      </div>
      
      <p className="text-xs text-slate-500 text-center mt-3 leading-relaxed">
        💡 リンクを送ると、相手も同じ診断結果を見られます
      </p>
    </div>
  );
}

function App() {
  // URLパラメータから診断結果を読み取り
  const urlParams = new URLSearchParams(window.location.search);
  const sharedTypeId = urlParams.get('type');
  const sharedTypeData = sharedTypeId ? CHARACTER_TYPES.find(t => t.id === sharedTypeId) : null;
  const isSharedView = !!sharedTypeData;
  
  const [step, setStep] = useState(isSharedView ? 'result' : 'home');
  const [palmImage, setPalmImage] = useState(null);
  const [birthDate, setBirthDate] = useState({ year: '', month: '', day: '' });
  const [diagnosedType, setDiagnosedType] = useState(sharedTypeData);
  const [progress, setProgress] = useState(0);

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      if (file.size > 10 * 1024 * 1024) {
        alert('画像サイズが大きすぎます。10MB以下にしてください。');
        return;
      }
      const reader = new FileReader();
      reader.onload = (e) => {
        setPalmImage(e.target.result);
        setStep('input');
      };
      reader.readAsDataURL(file);
    }
  };

  const handleDiagnose = () => {
    setStep('loading');
    setProgress(0);
    // 13秒かけてゆっくり進行（130ms × 100 = 13秒）
    const interval = setInterval(() => {
      setProgress(prev => {
        if (prev >= 100) {
          clearInterval(interval);
          setTimeout(() => {
            setDiagnosedType(CHARACTER_TYPES[Math.floor(Math.random() * CHARACTER_TYPES.length)]);
            setStep('result');
          }, 1000);
          return 100;
        }
        return prev + 1;
      });
    }, 130);
  };

  return (
    <div className="min-h-screen pb-8">
      {step === 'home' && <HomeScreen onImageUpload={handleImageUpload} />}
      {step === 'input' && <InputScreen birthDate={birthDate} setBirthDate={setBirthDate} onNext={handleDiagnose} palmImage={palmImage} />}
      {step === 'loading' && <LoadingScreen progress={progress} />}
      {step === 'result' && <ResultScreen type={diagnosedType} onNext={() => setStep('line')} />}
      {step === 'line' && <LineScreen type={diagnosedType} onRestart={() => { setStep('home'); setPalmImage(null); setDiagnosedType(null); }} />}
    </div>
  );
}

function HomeScreen({ onImageUpload }) {
  return (
    <div className="max-w-md mx-auto px-4 pt-8 fade-in">
      <div className="text-center mb-6">
        <div className="text-amber-600 text-xs mb-2 tracking-widest mincho">PALMISTRY × SANMEIGAKU</div>
        <h1 className="text-3xl font-bold mb-3 mincho text-slate-800 leading-tight">
          あなたの手が教える<br />本当の運命
        </h1>
        <p className="text-slate-600 text-xs">手相 × 算命学で性格・恋愛・適職を診断</p>
      </div>
      <div className="bg-white rounded-2xl shadow-xl p-6 mb-4">
        <div className="mb-6">
          <div className="w-24 h-24 mx-auto mb-4 bg-gradient-to-br from-amber-100 to-amber-50 rounded-full flex items-center justify-center">
            <svg className="w-12 h-12 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </div>
          <h3 className="text-center text-base font-bold mincho text-slate-800 mb-2">手のひらを撮影</h3>
          <p className="text-center text-xs text-slate-600 mb-6">明るい場所で、指を広げて撮影してください</p>
        </div>
        <input type="file" accept="image/*" capture="environment" onChange={onImageUpload} id="palm-upload" />
        <button onClick={() => document.getElementById('palm-upload').click()} className="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-white py-4 px-6 rounded-xl text-center active:scale-95 transition-all font-bold text-sm shadow-lg">
          📸 カメラを起動
        </button>
        <div className="mt-4 pt-4 border-t border-slate-200">
          <button onClick={() => document.getElementById('palm-upload').click()} className="w-full text-center text-xs text-slate-500">
            または、ギャラリーから選択
          </button>
        </div>
      </div>
      <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-xs text-slate-700">
        <div className="flex items-start gap-2">
          <span className="text-amber-600">💡</span>
          <div>
            <p className="font-bold mb-1">撮影のコツ</p>
            <ul className="space-y-1">
              <li>• 指を広げて手のひら全体を撮影</li>
              <li>• 明るい場所で撮影すると精度UP</li>
              <li>• 手のシワがはっきり見えるように</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  );
}

function InputScreen({ birthDate, setBirthDate, onNext, palmImage }) {
  const currentYear = new Date().getFullYear();
  const years = Array.from({ length: 100 }, (_, i) => currentYear - i);
  const months = Array.from({ length: 12 }, (_, i) => i + 1);
  const days = Array.from({ length: 31 }, (_, i) => i + 1);
  const isValid = birthDate.year && birthDate.month && birthDate.day;

  return (
    <div className="max-w-md mx-auto px-4 pt-6 fade-in">
      <div className="text-center mb-4">
        <div className="text-amber-600 text-xs mb-2">STEP 2/2</div>
        <h2 className="text-xl font-bold mincho text-slate-800 mb-2">生年月日を教えてください</h2>
        <p className="text-xs text-slate-600">より詳しい診断のために必要です</p>
      </div>
      {palmImage && (
        <div className="mb-4">
          <div className="bg-white rounded-xl p-3 shadow-md">
            <div className="flex items-center gap-3">
              <img src={palmImage} alt="手のひら" className="w-16 h-16 object-cover rounded-lg" />
              <div className="flex-1">
                <div className="text-xs text-slate-500">撮影完了</div>
                <div className="text-sm font-bold text-slate-800">✓ 手のひら画像</div>
              </div>
            </div>
          </div>
        </div>
      )}
      <div className="bg-white rounded-2xl shadow-xl p-6 mb-6">
        <label className="block text-sm font-bold text-slate-700 mb-2 mincho">生年月日</label>
        <div className="grid grid-cols-3 gap-2 mb-6">
          <select value={birthDate.year} onChange={(e) => setBirthDate({...birthDate, year: e.target.value})} className="px-2 py-3 border-2 border-slate-300 rounded-lg text-center text-sm bg-white">
            <option value="">年</option>
            {years.map(y => <option key={y} value={y}>{y}</option>)}
          </select>
          <select value={birthDate.month} onChange={(e) => setBirthDate({...birthDate, month: e.target.value})} className="px-2 py-3 border-2 border-slate-300 rounded-lg text-center text-sm bg-white">
            <option value="">月</option>
            {months.map(m => <option key={m} value={m}>{m}</option>)}
          </select>
          <select value={birthDate.day} onChange={(e) => setBirthDate({...birthDate, day: e.target.value})} className="px-2 py-3 border-2 border-slate-300 rounded-lg text-center text-sm bg-white">
            <option value="">日</option>
            {days.map(d => <option key={d} value={d}>{d}</option>)}
          </select>
        </div>
        <button onClick={onNext} disabled={!isValid} className={`w-full py-4 rounded-xl font-bold text-white text-sm ${isValid ? 'bg-gradient-to-r from-amber-500 to-orange-500 active:scale-95 shadow-lg' : 'bg-slate-300'}`}>
          {isValid ? '診断を開始する →' : '生年月日を入力してください'}
        </button>
      </div>
    </div>
  );
}

function LoadingScreen({ progress }) {
  const phases = [
    { 
      icon: '🖐️', 
      title: '手のひらを読み取っています',
      subtitle: '画像を解析中…',
      detail: '指先から手首までを丁寧にスキャン'
    },
    {

      title: '生命線を分析中',

      detail: 'カーブの大きさから人生の流れを判定'
    },
    {

      title: '頭脳線を解析中',
      subtitle: '思考パターンを読み取っています',
      detail: '論理性・直感力・創造性を分析中'
    },
    { 
      icon: '💖', 
      title: '感情線をチェック中',
      subtitle: '恋愛運・対人運を診断',

    {

    {

      subtitle: '才能・人気運を診断',
      detail: '輝く未来の可能性を探索'
    },
    {

      title: '財運線を分析中',

      detail: 'お金との縁を読み解いています'
    },
    { 
      icon: '🔮', 
      title: '算命学と統合中',
      subtitle: '生年月日と組み合わせ',
      detail: '宿命と運命を融合させています'
    },
    { 
      icon: '✨', 
      title: 'あなたの本質を解析中',
      subtitle: '性格・才能を統合分析',
      detail: '深層心理まで読み解いています'
    },
    { 
      icon: '🎯', 
      title: '最終診断中',
      subtitle: 'もうすぐ結果が出ます…',
      detail: 'あなたのタイプを確定中'
    }
  ];
  
  const phaseIndex = Math.min(Math.floor(progress / 10), phases.length - 1);
  const currentPhase = phases[phaseIndex];
  
  return (
    <div className="max-w-md mx-auto px-4 pt-12 pb-8">
      <div className="text-center">
        {/* メインアイコンエリア */}
